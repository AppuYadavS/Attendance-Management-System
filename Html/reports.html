<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attendance Report</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
.container{width:95%;margin:20px auto;background:white;padding:20px;border-radius:8px}
h1{text-align:center;margin:0 0 20px}
.filters{display:flex;justify-content:space-between;background:#e4e4ff;padding:15px;border-radius:7px}
.filters div{font-size:14px}
.filters select,.filters input{padding:5px}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #555;padding:8px;text-align:center}
thead{background:#333;color:white}
.summary{margin-top:10px;font-weight:bold}
button{padding:8px 15px;margin-top:10px;cursor:pointer}
.export{background:green;color:white;border:none}
</style>
</head>

<body>

<div class="container">

<h1>STUDENT ATTENDANCE REPORT</h1>

<!-- Filters -->
<div class="filters">

<div>
<label><b>Subject</b></label><br>
<select id="subject">
<option value="">Select</option>
<option>DBMS</option>
<option>JAVA</option>
<option>TOC</option>
<option>COA</option>
<option>CTM</option>
</select>
</div>

<div>
<label><b>Teacher</b></label><br>
<select id="teacher">
<option value="">Select</option>
<option>Mr. Randhir Sir</option>
<option>Ms. Ayushi Raj</option>
<option>Mr. Anurag Sir</option>
<option>Mr. Kundan Sir</option>
</select>
</div>

<div>
<label><b>From</b></label><br>
<input type="date" id="fromDate">
</div>

<div>
<label><b>To</b></label><br>
<input type="date" id="toDate">
</div>

<div>
<button onclick="loadReport()">Load Report</button>
</div>

</div>

<!-- Report Table -->
<table id="reportTable">
<thead>
<tr>
<th>Roll No</th>
<th>Student Name</th>
<th>Total Classes</th>
<th>Present</th>
<th>Absent</th>
<th>Attendance %</th>
</tr>
</thead>
<tbody></tbody>
</table>

<p class="summary" id="summaryText"></p>

<button class="export" onclick="exportExcel()">Download Excel</button>

</div>

<script>

// ******** SAMPLE DATA (Database ke jagah use ho sakta hai) ********
const students = [
{roll:"2024-CSE-21", name:"Amarjit Kumar", total:20, present:18},
{roll:"2024-CSE-16", name:"Mohit Kumar", total:20, present:10},
{roll:"2024-CSE-55", name:"Nikesh Kumar", total:20, present:7},
{roll:"2024-CSE-15", name:"Mithun Kumar", total:20, present:20},
{roll:"2024-CSE-02", name:"Hemant Singh", total:20, present:11},
{roll:"2024-CSE-17", name:"Ritesh Kumar", total:20, present:5}
];

function loadReport(){

let subject=document.getElementById("subject").value;
let teacher=document.getElementById("teacher").value;
let from=document.getElementById("fromDate").value;
let to=document.getElementById("toDate").value;

if(subject=="" || teacher=="" || from=="" || to==""){
alert("Please select all filters");
return;
}
if(from > to){
alert("Starting date cannot be greater than Ending date");
return;
}

let tbody=document.querySelector("#reportTable tbody");
tbody.innerHTML="";

let totalPresent=0,totalClasses=0;

students.forEach(s=>{
let absent = s.total - s.present;
let percent = ((s.present/s.total)*100).toFixed(2);

tbody.innerHTML += `
<tr>
<td>${s.roll}</td>
<td>${s.name}</td>
<td>${s.total}</td>
<td>${s.present}</td>
<td>${absent}</td>
<td>${percent}%</td>
</tr>
`;

totalPresent+=s.present;
totalClasses+=s.total;
});

// Summary
let overall = ((totalPresent/totalClasses)*100).toFixed(2);
document.getElementById("summaryText").innerText =
"Overall Attendance Percentage : " + overall + "%";
}


// ******** REAL EXCEL EXPORT ********
function exportExcel(){
var table=document.getElementById("reportTable");
var html=table.outerHTML;

var blob=new Blob(['\ufeff',html],{
type:'application/vnd.ms-excel'
});

var url=URL.createObjectURL(blob);
var a=document.createElement("a");
a.href=url;
a.download="Attendance_Report.xls";
a.click();
}

</script>

</body>
</html>
